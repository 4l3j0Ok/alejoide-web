steps:
  - name: build-and-push
    image: woodpeckerci/plugin-docker-buildx:6
    settings:
      registry: docker.io
      repo: alejoide/alejoide-web
      username:
        from_secret: dockerhub_username
      password:
        from_secret: dockerhub_token
      tags:
        - latest
        - ${CI_COMMIT_TAG}
      dockerfile: Dockerfile
      platforms: linux/amd64,linux/arm64
when:
  event:
    - tag
  branch:
    - main
