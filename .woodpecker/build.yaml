steps:
  - name: build-and-push
    image: woodpeckerci/plugin-docker-buildx:6
    settings:
      registry: docker.io
      repo: alejoide/alejoide-web
      username:
        from_secret: dockerhub_username
      password:
        from_secret: dockerhub_token
      tags:
        - latest
        - ${CI_COMMIT_TAG}
      dockerfile: Dockerfile
      platforms: linux/amd64,linux/arm64
  - name: trigger-deploy
    image: woodpeckerci/plugin-trigger
    settings:
      token:
        from_secret: woodpecker_deploy_token
      repositories:
        - 4l3j0Ok/alejoide-web@main
      deploy: alejoide-web
      last_successful: true
    when:
      status:
        - success
when:
  event:
    - tag
  branch:
    - main
